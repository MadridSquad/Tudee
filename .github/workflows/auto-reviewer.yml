name: 'Auto-Request Review'
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  add-reviewers:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 'Add reviewers to PR'
        uses: poad/request-review-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reviewers: "Ahmedsayed0895,HendSayed25,kareem-01,karrar-abbas,khaledeid1k,Mohamed-Boumaraf,Mohamedragabali,Mostafa-alsaygh,NadaMansour20,omer1998,saraashraf11"
